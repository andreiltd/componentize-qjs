name: Publish CLI release assets

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      release_tag:
        description: Release tag to build from
        required: false
        type: string
  workflow_call:
    inputs:
      release_tag:
        description: Release tag to build from
        required: true
        type: string

permissions:
  contents: write
  id-token: write
  attestations: write

concurrency:
  group: cli-release-${{ inputs.release_tag || github.event.release.tag_name || github.ref_name }}
  cancel-in-progress: false

env:
  CARGO_TERM_COLOR: always
  RELEASE_TAG: ${{ inputs.release_tag || github.event.release.tag_name || github.ref_name }}

jobs:
  build:
    name: Build CLI - ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            archive: tar.gz
            cross: true
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            archive: tar.gz
            musl: true
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            archive: tar.gz
            cross: true
            musl: true
          - target: x86_64-apple-darwin
            os: macos-15-intel
            archive: tar.gz
          - target: aarch64-apple-darwin
            os: macos-14
            archive: tar.gz
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            archive: zip
          - target: aarch64-pc-windows-msvc
            os: windows-latest
            archive: zip

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          targets: wasm32-wasip2,${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Install cargo-binstall
        uses: cargo-bins/cargo-binstall@dc19f1e48450eefe5a29b8da6c6b00a87d730b37 # v1.18.1

      - name: Install auditable build tool
        run: cargo binstall cargo-auditable --force

      - name: Install cross-compilation tools
        if: matrix.cross
        uses: taiki-e/setup-cross-toolchain-action@d62f33b587e73b0004731caebc7d2d46b18a7567 # v1.39.2
        with:
          target: ${{ matrix.target }}

      - name: Install musl tools
        if: matrix.musl
        run: sudo apt-get install -y musl-tools

      - name: Build CLI
        run: cargo build --release --bin componentize-qjs --target ${{ matrix.target }}
        env:
          COMPONENTIZE_QJS_RUNTIME_AUDITABLE: 1

      - name: Package CLI
        shell: bash
        run: |
          set -euo pipefail
          checksum() {
            if command -v sha256sum >/dev/null 2>&1; then
              sha256sum "$1"
            else
              shasum -a 256 "$1"
            fi
          }

          version="${RELEASE_TAG#v}"
          pkg="componentize-qjs-v${version}-${{ matrix.target }}"
          mkdir -p "dist/${pkg}"
          if [[ "${{ matrix.target }}" == *windows* ]]; then
            cp "target/${{ matrix.target }}/release/componentize-qjs.exe" "dist/${pkg}/"
          else
            cp "target/${{ matrix.target }}/release/componentize-qjs" "dist/${pkg}/"
          fi
          cp README.md "dist/${pkg}/"
          if [[ "${{ matrix.archive }}" == "zip" ]]; then
            (cd dist && 7z a "${pkg}.zip" "${pkg}")
            checksum "dist/${pkg}.zip" > "dist/${pkg}.zip.sha256"
          else
            tar -czf "dist/${pkg}.tar.gz" -C dist "${pkg}"
            checksum "dist/${pkg}.tar.gz" > "dist/${pkg}.tar.gz.sha256"
          fi
          rm -rf "dist/${pkg}"

      - name: Attest CLI archives
        if: github.event_name != 'workflow_dispatch'
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: dist/*

      - name: Upload CLI archives to release
        if: github.event_name != 'workflow_dispatch'
        shell: bash
        run: gh release upload "${RELEASE_TAG}" dist/* --clobber
        env:
          GH_TOKEN: ${{ github.token }}
